<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlocal Alerts</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-cloud-sun"></i> Smart Weather
        </a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="map.html">Explorer Map</a>
            <a href="farmer.html">Farmer Mode</a>
            <a href="aqi.html">Health & AQI</a>
            <a href="trends.html">Trends</a>
            <a href="alerts.html" class="active">Alerts</a>
            <a href="#" id="logout-btn" style="color:var(--alert-danger)"><i class="fa-solid fa-right-from-bracket"></i>
                Logout</a>
        </div>
        <button class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>

    <div class="container">
        <header style="margin-bottom: 2rem;">
            <h1><i class="fa-solid fa-triangle-exclamation" style="color:var(--alert-danger)"></i> Active Environmental
                Alerts</h1>
            <p style="color: var(--text-secondary);">Automated situational advisories triggered for precise geographic
                zones.</p>
        </header>

        <div id="main-loader" class="loader"></div>
        <div id="error-message" style="display:none; color: var(--alert-danger); text-align: center;"></div>

        <div id="alerts-container" style="max-width: 800px; margin: 0 auto;">
            <!-- Injected by main.js in fetchAlerts() -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Smart Weather Advisory System | Built by Rudraksh Thakare</p>
    </footer>

    <script src="assets/js/main.js"></script>
</body>

</html>
