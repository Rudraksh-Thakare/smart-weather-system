<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map - Smart Weather</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        .map-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 70vh;
            /* Takes up most of the screen below header */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            margin-top: 1rem;
        }

        #weather-map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
            /* Keep map below navbar */
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .leaflet-popup-tip {
            background: var(--bg-secondary);
        }

        .map-popup-header {
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .map-stat-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.3rem 0;
            font-size: 0.95rem;
        }

        .map-advisory {
            margin-top: 0.8rem;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            background: rgba(var(--accent-rgb), 0.1);
            border-left: 3px solid var(--accent);
        }

        /* Loading overlay for map clicks */
        .map-loading {
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-cloud-sun"></i> Smart Weather
        </a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="map.html" class="active">Explorer Map</a>
            <a href="farmer.html">Farmer Mode</a>
            <a href="aqi.html">Health & AQI</a>
            <a href="trends.html">Trends</a>
            <a href="alerts.html">Alerts</a>
            <a href="#" id="logout-btn" style="color:var(--alert-danger)"><i class="fa-solid fa-right-from-bracket"></i>
                Logout</a>
        </div>
        <button class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>

    <div class="container" style="max-width: 1400px;">
        <header>
            <h1><i class="fa-solid fa-earth-americas" style="color:var(--accent)"></i> Weather Map Explorer</h1>
            <p style="color: var(--text-secondary);">Click any location globally to view immediate weather conditions,
                air quality, and farming tips.</p>
        </header>

        <div id="main-loader" class="loader" style="display:none;"></div>
        <div id="error-message" style="display:none; color: var(--alert-danger); text-align: center; margin-top: 1rem;">
        </div>

        <div class="map-container glass">
            <div id="weather-map"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Smart Weather Advisory System | Built by Rudraksh Thakare</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Custom Scripts -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/map.js"></script>
</body>

</html>
