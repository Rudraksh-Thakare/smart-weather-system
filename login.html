<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Weather</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: linear-gradient(135deg, var(--bg-primary), var(--accent));
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
        }

        .auth-logo {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .auth-btn {
            background: var(--accent);
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-switch {
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        #auth-error {
            color: var(--alert-danger);
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <!-- Login Form -->
        <div class="card glass auth-card" id="login-box">
            <div class="auth-logo"><i class="fa-solid fa-cloud-sun"></i></div>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-secondary);">Sign in to your Smart Weather account</p>

            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="login-username" placeholder="Username or Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <div id="login-error"
                style="color: var(--alert-danger); display: none; margin-top: 10px; font-size: 0.9rem;"></div>

            <div class="auth-switch">
                Don't have an account? <a id="show-register">Sign Up</a>
            </div>
        </div>

        <!-- Registration Form (Hidden Initially) -->
        <div class="card glass auth-card" id="register-box" style="display: none;">
            <div class="auth-logo"><i class="fa-solid fa-cloud-sun"></i></div>
            <h2>Create Account</h2>
            <p style="color: var(--text-secondary);">Join Smart Weather today to get alerts and insights</p>

            <form class="auth-form" id="register-form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Create Password" required>
                </div>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
            <div id="reg-error" style="color: var(--alert-danger); display: none; margin-top: 10px; font-size: 0.9rem;">
            </div>

            <div class="auth-switch">
                Already have an account? <a id="show-login">Sign In</a>
            </div>
        </div>
    </div>

    <!-- The root variables check is skipped here for a pure auth flow, but could be added -->
    <script src="assets/js/auth.js"></script>
</body>

</html>
